name: Test · analyze + flutter test

# Runs the Dart analyzer and the full test suite (incl. the adventure-target
# drift guard) on every push and PR. The Flutter version is single-sourced in
# .fvmrc — all workflows read it via flutter-version-file.

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

# A newer push to the same branch/PR supersedes the in-flight run.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
