name: Android · Play

# Build the signed Android App Bundle and stage it on the Play testing tracks
# on a version tag (v*) — the Android counterpart to ios.yml (TestFlight).
# A tag push stages on BOTH "internal" (instant, no review — the family
# track) and "alpha" (the closed-testing track, review-gated for new apps).
# A manual workflow_dispatch stages on a single chosen track instead.
# Ported from knabberfuchs; reuses the local release tooling: the upload
# keystore for signing + tool/play_upload_aab.py (service account).
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64      base64 of the upload keystore (.jks)
#   ANDROID_KEY_ALIAS            key alias inside the keystore
#   ANDROID_KEY_PASSWORD         password for that key
#   ANDROID_STORE_PASSWORD       password for the keystore
#   PLAY_STORE_KEY_JSON_BASE64   base64 of fastlane/play-store-key.json
#
# Make a base64 secret with:  base64 -w0 <file>   (macOS: base64 -i <file>)
# Without these the build still runs but falls back to the DEBUG signing key,
# which Play rejects on upload — so all five are mandatory for the upload to land.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to stage the release on (manual run only)"
        default: "internal"
        type: choice
        options: [internal, alpha, beta, production]

jobs:
  # Same analyze + test suite as test.yml: a v* tag on a red or never-tested
  # commit must not reach the Play tracks.
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

  play:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 40
    # A manual dispatch to the production track is a full public rollout
    # (status: completed) — bind it to the protected `play-production`
    # environment, whose required-reviewer rule holds the job until approved
    # in the GitHub UI. Every other path runs unguarded.
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.track == 'production' && 'play-production' || '' }}
    # Serialize Play uploads: concurrent runs would race independent edits
    # against the same app. Queue, never cancel, a release in flight.
    concurrency:
      group: play-release
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v7

      - name: Verify tag matches pubspec version
        if: github.ref_type == 'tag'
        env:
          TAG: ${{ github.ref_name }}
        run: |
          PUBSPEC=$(grep -m1 '^version:' pubspec.yaml | awk '{print $2}')
          if [ "${TAG#v}" != "${PUBSPEC%%+*}" ]; then
            echo "::error::Tag $TAG does not match pubspec.yaml version: $PUBSPEC — bump pubspec (and the four changelogs) before tagging."
            exit 1
          fi

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2 # v2.23.0
        with:
          flutter-version-file: .fvmrc
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install signing keystore & key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is empty — release would sign with the debug key and Play would reject it."
            exit 1
          fi
          KEYSTORE="$RUNNER_TEMP/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          # storeFile is read via Gradle file(...) — an absolute path resolves as-is.
          cat > android/key.properties <<EOF
          storeFile=$KEYSTORE
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install Play service-account key
        env:
          PLAY_STORE_KEY_JSON_BASE64: ${{ secrets.PLAY_STORE_KEY_JSON_BASE64 }}
        run: |
          if [ -z "$PLAY_STORE_KEY_JSON_BASE64" ]; then
            echo "::error::PLAY_STORE_KEY_JSON_BASE64 is empty — the upload would fail with an auth traceback only after the build."
            exit 1
          fi
          mkdir -p fastlane
          echo "$PLAY_STORE_KEY_JSON_BASE64" | base64 --decode > fastlane/play-store-key.json

      - name: Build release App Bundle
        run: flutter build appbundle --release

      - name: Upload to Play
        env:
          DISPATCH_TRACK: ${{ github.event.inputs.track }}
        run: |
          python3 -m pip install --quiet google-api-python-client google-auth
          if [ -n "$DISPATCH_TRACK" ]; then
            # Manual run: stage on the chosen track only.
            python3 tool/play_upload_aab.py "$DISPATCH_TRACK"
          else
            # Tag push (v*): internal (instant, family) + alpha (closed test).
            python3 tool/play_upload_aab.py internal alpha
          fi
